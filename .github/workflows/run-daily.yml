name: Run Scripts Daily

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '30 7 * * *'
    - cron: '30 11 * * *'
    - cron: '30 15 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ✅ future-proof

jobs:
  run-scripts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install
          playwright install-deps

      - name: Run all scripts and collect errors
        run: |
          set -eo pipefail

          mkdir -p logs
          rm -f logs/failures.txt
          failed=0

          hour=$(date -u +%H)
          minute=$(date -u +%M)
          echo "Current UTC time: ${hour}:${minute}"

          if (( 0 <= hour && hour < 3 )); then
            IS_MORNING_RUN=true
          else
            IS_MORNING_RUN=false
          fi

          echo "Is morning run (5:30 AM IST window)? ${IS_MORNING_RUN}"

          for file in scripts/*.py; do
            if [ ! -e "$file" ]; then
              echo "No scripts found in scripts/; skipping."
              break
            fi

            if [[ "$(basename "$file")" == "dashboard_4.py" && "$IS_MORNING_RUN" != "true" ]]; then
              echo "Skipping $file for this schedule"
              continue
            fi

            logname="logs/$(basename "$file").log"

            echo "Running $file (Attempt 1)"
            if python "$file" >> "$logname" 2>&1; then
              echo "$file SUCCESS"
              continue
            fi

            echo "$file failed. Retrying..."
            sleep 10

            if python "$file" >> "$logname" 2>&1; then
              echo "$file SUCCESS on retry"
              continue
            fi

            echo "$file FAILED after retry" | tee -a logs/failures.txt
            failed=1
          done

          if [ $failed -eq 1 ]; then
            exit 1
          fi

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: script-logs
          path: logs/